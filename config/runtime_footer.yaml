# Runtime Footer Configuration
# Add these under display: in ~/.hermes/config.yaml
#
# To enable globally:
#   display:
#     runtime_footer:
#       enabled: true
#       fields: [model, context_pct, cwd]
#
# Or per-platform (e.g., Slack only):
#   display:
#     platforms:
#       slack:
#         runtime_footer:
#           enabled: true
#           fields: [model, context_pct, cwd]

# Default fields shown in footer:
#   model     - Model name (e.g., qwen3.6-35b-a3b)
#   context_pct - Context token usage % (e.g., 25%)
#   cwd       - Working directory (e.g., ~/.hermes)
#
# Separator: " · " (middle dot)
# Example output: qwen3.6-35b-a3b · 25% · ~/.hermes
