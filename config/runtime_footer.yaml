# Runtime Footer Config Patch
# ============================
# Enables the context-status footer on Slack replies.
#
# Footer format: model · context% · cwd
# Example: qwen3.6-35b-a3b · 25% · ~/.hermes
#
# HOW TO APPLY:
# 1. Open ~/.hermes/config.yaml
# 2. Find display.runtime_footer
# 3. Change enabled: false to enabled: true
# 4. Restart the gateway
